name: Release

# Baut die Release-Artefakte, sobald ein v*-Tag gepusht wird, und hängt sie ans
# GitHub-Release. Dank cgo-freiem Stack (Server/Agents CGO_ENABLED=0, Viewer via
# SDL3/purego) genügt ein Ubuntu-Runner mit Go + Node – keine Cross-Toolchain.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Vorhandenes Tag bauen (z. B. v0.1.112)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Tag/Version ermitteln
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Artefakte bauen
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          echo "$VERSION" > VERSION
          LDFLAGS="-s -w -X main.version=$VERSION"
          make fetch-sdl3                 # SDL3.dll fürs Windows-Viewer-ZIP
          make viewer-embed               # Linux-Viewer (cgo-frei) ins Embed
          make viewer-embed-windows       # Windows-Viewer (.exe + SDL3.dll) ins Embed
          make server                     # Frontend + Agents-Embed + Linux-Server
          mkdir -p dist
          cp bin/server dist/pc-inventory-server-linux-amd64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o dist/pc-inventory-server-windows-amd64.exe ./cmd/server
          cp internal/server/viewerdist/bin/pcinv-viewer-linux-amd64      dist/pcinv-viewer-linux-amd64
          cp internal/server/viewerdist/bin/pcinv-viewer-windows-amd64.zip dist/pcinv-viewer-windows-amd64.zip
          ls -la dist

      - name: Ans Release hängen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true

  # macOS-Viewer separat auf einem macOS-Runner: dort liefert Homebrew die
  # libSDL3.dylib zum Bündeln (der Viewer selbst ist weiterhin cgo-frei).
  macos-viewer:
    runs-on: macos-latest
    steps:
      - name: Tag/Version ermitteln
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: SDL3 (Homebrew) + Viewer bauen
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          echo "$VERSION" > VERSION
          brew install sdl3
          make viewer-embed-darwin SDL3_MAC_DYLIB="$(brew --prefix sdl3)/lib/libSDL3.dylib"
          mkdir -p dist
          cp internal/server/viewerdist/bin/pcinv-viewer-darwin-arm64.zip dist/pcinv-viewer-darwin-arm64.zip
          ls -la dist

      - name: Ans Release hängen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
