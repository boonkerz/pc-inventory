# Produktions-Deployment des Inventory-Servers (nur der Server).
# Läuft als HTTP auf Host-Port 80; ein vorgelagerter Reverse-Proxy terminiert TLS
# für https://inventory.example.com und reicht WebSockets durch.
#
#   docker compose -f deploy/production/compose.yml up -d --build
#
# Erststart: Admin-Passwort steht einmalig im Log (docker compose logs inventory),
# danach beim ersten Login 2FA einrichten. Enrollment-Tokens für Agents werden
# in der UI erzeugt (kein festes Seed-Token in Produktion!).

name: roster

volumes:
  inventory-data:

services:
  inventory:
    build:
      context: ../..
      dockerfile: docker/server/Dockerfile
      args:
        VERSION: "${VERSION:-0.1.0}"
    restart: unless-stopped
    ports:
      - "80:8443"            # Host-Port 80 -> Container-HTTP 8443 (Proxy zielt hierauf)
    environment:
      ROSTER_ADDR: ":8443"
      ROSTER_DB: "sqlite:///var/lib/roster/inventory.db"
      # Hinter HTTPS-Proxy: Secure-Cookies behalten, obwohl der Server HTTP spricht.
      ROSTER_BEHIND_PROXY: "true"
      ROSTER_SECURE_COOKIE: "true"
      ROSTER_REQUIRE_2FA: "true"
      ROSTER_SEED_ADMIN_USER: "admin"
      # ROSTER_SEED_ADMIN_PASSWORD leer lassen -> wird beim Erststart erzeugt + geloggt.
      # KEIN ROSTER_SEED_ENROLL_TOKEN in Produktion (Tokens über die UI).
    volumes:
      - inventory-data:/var/lib/roster
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8443/"]
      interval: 10s
      timeout: 3s
      retries: 12
